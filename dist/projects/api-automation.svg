    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.12" r="0.8">
      <stop offset="0" stop-color="#5ed29c" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#5ed29c" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="10" height="10" patternUnits="userSpaceOnUse">
