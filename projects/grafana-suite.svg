<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2100 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f1622"/>
      <stop offset="1" stop-color="#1d3f55"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.78" cy="0.2" r="0.8">
      <stop offset="0" stop-color="#6cf0be" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#6cf0be" stop-opacity="0"/>
    </radialGradient>
    <pattern id="lines" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#ffffff" stroke-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="2100" height="800" fill="url(#bg)"/>
  <rect width="2100" height="800" fill="url(#halo)"/>
  <rect width="2100" height="800" fill="url(#lines)"/>

  <rect x="80" y="104" width="1940" height="604" rx="30" fill="#0b131d" fill-opacity="0.62" stroke="#ffffff" stroke-opacity="0.14"/>

  <text x="120" y="188" fill="#f2fbff" font-size="70" font-family="Inter, Arial" font-weight="700">Grafana QA Monitoring Suite</text>
  <text x="120" y="248" fill="#9fd8cb" font-size="32" font-family="Inter, Arial">cross-brand telemetry and KPI monitoring</text>

  <g>
    <rect x="120" y="288" width="590" height="360" rx="20" fill="#101a28" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="152" y="338" fill="#dbefff" font-size="24" font-family="Inter, Arial">Conversation Volume</text>
    <polyline points="152,580 220,550 288,560 356,520 424,528 492,470 560,482 628,444" fill="none" stroke="#6cf0be" stroke-width="4"/>
  </g>

  <g>
