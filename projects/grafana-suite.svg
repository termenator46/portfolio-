    <text x="788" y="338" fill="#dbefff" font-size="24" font-family="Inter, Arial">Agent Efficiency</text>
    <rect x="800" y="390" width="50" height="220" rx="8" fill="#4e85bf"/>
    <rect x="890" y="350" width="50" height="260" rx="8" fill="#5ed29c"/>
    <rect x="980" y="420" width="50" height="190" rx="8" fill="#4e85bf"/>
    <rect x="1070" y="330" width="50" height="280" rx="8" fill="#5ed29c"/>
    <rect x="1160" y="370" width="50" height="240" rx="8" fill="#4e85bf"/>
  </g>

  <g>
    <rect x="1392" y="288" width="590" height="360" rx="20" fill="#101a28" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="1424" y="338" fill="#dbefff" font-size="24" font-family="Inter, Arial">Anomaly Queue</text>
    <g font-family="Inter, Arial" font-size="22">
      <text x="1424" y="404" fill="#ffd5a1">response_delay_spike .... MEDIUM</text>
      <text x="1424" y="452" fill="#ffb7b7">no_reply_window ......... HIGH</text>
      <text x="1424" y="500" fill="#c8f2e5">telemetry_gap ........... LOW</text>
      <text x="1424" y="548" fill="#9ee1ff">brand_isolation_check ... PASS</text>
    </g>
